<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notulensi.AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }
        input[type="date"].color-scheme-dark::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
    </style>
</head>
<body class="bg-[#0a0f1d] text-slate-200 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // ==========================================
        // 1. TEMPELKAN API KEY GEMINI ANDA DI SINI
        // ==========================================
        // (Wajib diisi sebelum deploy ke Vercel agar tidak Error 400)
        const defaultApiKey = ""; 

        // ==========================================
        // KONFIGURASI FIREBASE ANDA
        // ==========================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyCsjjv_ofD3i4HsnkkQl5ie7eeJDmjPCNY",
            authDomain: "notulensi-70912.firebaseapp.com",
            projectId: "notulensi-70912",
            storageBucket: "notulensi-70912.firebasestorage.app",
            messagingSenderId: "95731878532",
            appId: "1:95731878532:web:e3653fc11342ebea2e10d1"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(myFirebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'notulensi-ai-app';

        // --- KONFIGURASI EKSTERNAL ---
        const GOOGLE_SHEETS_WEBHOOK = "https://script.google.com/macros/s/AKfycbwan8bQO_lmnVrgnUga1401_VDzr0Odq6jvkeFM93TLUrqEwGMGQbjY6R87AxHWor7yCg/exec";
        const ADMIN_WA_NUMBER = "6287838960454"; 

        function App() {
            // --- STATE AUTENTIKASI & NAVIGASI ---
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentView, setCurrentView] = useState('login');
            const [authForm, setAuthForm] = useState({ name: '', email: '', password: '', accessCode: '' });
            const [authStatus, setAuthStatus] = useState({ loading: false, error: '', success: '' });
            
            const [dynamicApiKey, setDynamicApiKey] = useState("");
            const [aiModel, setAiModel] = useState("gemini-2.0-flash");

            // --- STATE APLIKASI UTAMA ---
            const [activeTab, setActiveTab] = useState('create');
            const [historyRecords, setHistoryRecords] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);

            const [formData, setFormData] = useState({
                instansiNama: '', instansiAlamat: '', tanggal: '', tempat: '', acara: '', pimpinan: '',
                pencatat: '', peserta: '', transkrip: '', pembahasan: '', arahanPimpinan: '', kesimpulan: ''
            });
            const [paperSize, setPaperSize] = useState('a4');
            const [participantInput, setParticipantInput] = useState("");
            const [instansiLogo, setInstansiLogo] = useState(null);
            const [audioFile, setAudioFile] = useState(null);
            const [audioUrl, setAudioUrl] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isSaving, setIsSaving] = useState(false); 
            const [statusMessage, setStatusMessage] = useState("");
            const [alertMessage, setAlertMessage] = useState(null);
            const reportRef = useRef(null);

            // --- INITIALIZATION ---
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        setCurrentView('app');
                        setAuthStatus({ loading: false, error: '', success: '' });
                    } else {
                        setCurrentView('login');
                        setAuthStatus({ loading: false, error: '', success: '' });
                        setAuthForm({ name: '', email: '', password: '', accessCode: '' });
                    }
                    setAuthLoading(false);
                });

                const fetchDynamicApiKey = async () => {
                    try {
                        const res = await fetch(`${GOOGLE_SHEETS_WEBHOOK}?action=getApiKey`);
                        if (res.ok) {
                            const data = await res.json();
                            if (data.apiKey) setDynamicApiKey(data.apiKey);
                        }
                    } catch (err) {
                        console.log("Menggunakan API Key bawaan.");
                    }
                };
                fetchDynamicApiKey();

                return () => unsubscribe();
            }, []);

            // --- FETCH RIWAYAT NOTULENSI ---
            useEffect(() => {
                if (!user) return;
                
                setIsLoadingHistory(true);
                const recordsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notulensi_records');
                
                const unsubscribe = recordsRef.onSnapshot((snapshot) => {
                    const records = [];
                    snapshot.forEach((doc) => {
                        records.push({ id: doc.id, ...doc.data() });
                    });
                    
                    records.sort((a, b) => {
                        const timeA = a.savedAt?.toMillis() || 0;
                        const timeB = b.savedAt?.toMillis() || 0;
                        return timeB - timeA;
                    });
                    
                    setHistoryRecords(records);
                    setIsLoadingHistory(false);
                }, (error) => {
                    console.error("Fetch history error:", error);
                    setIsLoadingHistory(false);
                });

                return () => unsubscribe();
            }, [user]);

            // --- HANDLER AUTENTIKASI ---
            const handleAuthInputChange = (e) => {
                setAuthForm({ ...authForm, [e.target.name]: e.target.value });
                setAuthStatus({ loading: false, error: '', success: '' });
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthStatus({ loading: true, error: '', success: '' });
                try {
                    await auth.signInWithEmailAndPassword(authForm.email, authForm.password);
                } catch (error) {
                    console.error("Firebase Login Error:", error);
                    let errorMsg = "Login gagal: Email atau password salah.";
                    if (error.code === 'auth/invalid-credential') errorMsg = 'Email atau password yang Anda masukkan salah.';
                    if (error.code === 'auth/user-not-found') errorMsg = 'Akun tidak ditemukan. Silakan registrasi terlebih dahulu.';
                    if (error.code === 'auth/operation-not-allowed') errorMsg = 'PENTING: Fitur Login "Email/Password" belum diaktifkan! Buka Firebase Console > Authentication > Sign-in method > Aktifkan "Email/Password".';
                    
                    setAuthStatus({ loading: false, error: errorMsg, success: '' });
                }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                setAuthStatus({ loading: true, error: '', success: '' });
                
                let isCodeValid = false;
                try {
                    const verifyUrl = `${GOOGLE_SHEETS_WEBHOOK}?action=verifyCode&code=${encodeURIComponent(authForm.accessCode)}`;
                    const verifyRes = await fetch(verifyUrl);
                    if (verifyRes.ok) {
                        const verifyData = await verifyRes.json();
                        isCodeValid = verifyData.valid;
                    } else {
                        throw new Error("Server response not ok");
                    }
                } catch (err) {
                    console.error("Koneksi ke server verifikasi gagal:", err);
                    setAuthStatus({ loading: false, error: 'Gagal terhubung ke server verifikasi. Coba lagi nanti.', success: '' });
                    return;
                }

                if (!isCodeValid) {
                    setAuthStatus({ loading: false, error: 'Kode Akses salah! Silakan hubungi Admin.', success: '' });
                    return;
                }

                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(authForm.email, authForm.password);
                    const newUser = userCredential.user;

                    await db.collection('artifacts').doc(appId).collection('users').doc(newUser.uid).collection('profile').doc('data').set({
                        name: authForm.name,
                        email: authForm.email,
                        role: 'user',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    try {
                        const syncUrl = `${GOOGLE_SHEETS_WEBHOOK}?action=register&name=${encodeURIComponent(authForm.name)}&email=${encodeURIComponent(authForm.email)}&date=${encodeURIComponent(new Date().toLocaleString('id-ID'))}&uid=${encodeURIComponent(newUser.uid)}`;
                        await fetch(syncUrl, { mode: 'no-cors' });
                    } catch (sheetErr) {
                        console.warn("Gagal merekap ke Google Sheets.", sheetErr);
                    }

                } catch (error) {
                    console.error("Firebase Registration Error:", error);
                    let errorMsg = `Gagal: ${error.message}`;
                    if (error.code === 'auth/email-already-in-use') errorMsg = 'Email ini sudah terdaftar. Silakan gunakan email lain atau Login.';
                    if (error.code === 'auth/weak-password') errorMsg = 'Password terlalu lemah (Minimal 6 karakter).';
                    if (error.code === 'auth/operation-not-allowed') errorMsg = 'PENTING: Fitur Login "Email/Password" belum diaktifkan! Buka Firebase Console > Authentication > Sign-in method > Aktifkan "Email/Password".';
                    
                    setAuthStatus({ loading: false, error: errorMsg, success: '' });
                }
            };

            const handleForgotPassword = async (e) => {
                e.preventDefault();
                setAuthStatus({ loading: true, error: '', success: '' });
                try {
                    await auth.sendPasswordResetEmail(authForm.email);
                    setAuthStatus({ loading: false, error: '', success: 'Tautan reset password telah dikirim ke email Anda!' });
                } catch (error) {
                    setAuthStatus({ loading: false, error: 'Gagal mengirim email reset. Pastikan email terdaftar.', success: '' });
                }
            };

            const handleSaveToFirebase = async () => {
                if (!user) {
                    setAlertMessage("Sesi telah habis. Silakan login kembali.");
                    return;
                }
                if (!formData.acara && !formData.pembahasan) {
                    setAlertMessage("Data notulensi masih kosong. Silakan proses AI terlebih dahulu atau isi data secara manual.");
                    return;
                }

                setIsSaving(true);
                try {
                    const notulensiRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notulensi_records');
                    await notulensiRef.add({
                        ...formData,
                        aiModelUsed: aiModel,
                        savedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) {
                    console.error("Firebase Save Error: ", error);
                    setAlertMessage(`Gagal menyimpan ke Firebase: ${error.message}`);
                } finally {
                    setIsSaving(false);
                }
            };

            // --- HANDLER APLIKASI UTAMA ---
            const handleNewRecord = () => {
                setFormData({
                    instansiNama: '', instansiAlamat: '', tanggal: '', tempat: '', acara: '', pimpinan: '',
                    pencatat: '', peserta: '', transkrip: '', pembahasan: '', arahanPimpinan: '', kesimpulan: ''
                });
                setAudioFile(null);
                setAudioUrl(null);
                setInstansiLogo(null);
                setParticipantInput("");
                setActiveTab('create');
            };

            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

            const handleAddParticipant = () => {
                if (!participantInput.trim()) return;
                const currentList = formData.peserta ? formData.peserta.split('\n').filter(p => p.trim() !== '') : [];
                setFormData(prev => ({ ...prev, peserta: [...currentList, participantInput.trim()].join('\n') }));
                setParticipantInput("");
            };

            const handleDeleteParticipant = (index) => {
                const currentList = formData.peserta ? formData.peserta.split('\n').filter(p => p.trim() !== '') : [];
                setFormData(prev => ({ ...prev, peserta: currentList.filter((_, i) => i !== index).join('\n') }));
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setInstansiLogo(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleAudioUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 25 * 1024 * 1024) {
                        setAlertMessage("Ukuran file terlalu besar! Maksimal adalah 25 MB.");
                        e.target.value = null; return;
                    }
                    const audioTag = document.createElement('audio');
                    audioTag.src = URL.createObjectURL(file);
                    audioTag.onloadedmetadata = () => {
                        if (audioTag.duration > 15 * 60) {
                            setAlertMessage("Durasi audio terlalu panjang! Maksimal durasi 15 menit.");
                            setAudioFile(null); setAudioUrl(null); e.target.value = null;
                        } else {
                            setAudioFile(file); setAudioUrl(audioTag.src);
                        }
                    };
                }
            };

            const fileToBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });

            // FUNGSI UTAMA AI DENGAN DIAGNOSIS ERROR YANG LENGKAP
            const callGeminiAI = async (prompt, audioData = null) => {
                let retries = 0; 
                const maxRetries = 5; 
                const delays = [1000, 2000, 4000, 8000, 16000];
                
                const activeApiKey = (dynamicApiKey || defaultApiKey || "").trim();
                const effectiveModel = activeApiKey === "" ? "gemini-2.5-flash-preview-09-2025" : aiModel;

                const contents = [{ parts: [{ text: prompt }] }];
                if (audioData) contents[0].parts.push({ inlineData: { mimeType: audioFile.type || "audio/mpeg", data: audioData }});

                while (retries < maxRetries) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${effectiveModel}:generateContent?key=${activeApiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents, generationConfig: { temperature: 0.4 } })
                        });
                        
                        if (!response.ok) {
                            // Mengambil pesan asli dari server Google
                            const errData = await response.json().catch(() => ({}));
                            const errMsg = errData.error?.message || response.statusText;
                            
                            // Diagnosis khusus Error 400
                            if (response.status === 400) {
                                if (errMsg.toLowerCase().includes("api key not valid")) {
                                    throw new Error("Kunci API Anda SALAH atau TIDAK VALID. Silakan buat Kunci API baru di aistudio.google.com dan pastikan tidak ada spasi saat dicopy.");
                                }
                                throw new Error(`Format audio ditolak oleh AI (Error 400). Detail: ${errMsg}`);
                            }
                            
                            // Diagnosis Khusus Error 403
                            if (response.status === 403) {
                                throw new Error("Akses Ditolak (Error 403). Kunci API Anda kemungkinan dibatasi di Google Cloud. Silakan ubah Application Restrictions menjadi 'None'.");
                            }

                            // Diagnosis Khusus Error 429
                            if (response.status === 429) {
                                throw new Error("Limit Kuota API Habis (Error 429). Silakan tunggu 1 menit lalu coba lagi.");
                            }
                            
                            throw new Error(`API error ${response.status}: ${errMsg}`);
                        }
                        
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (error) {
                        retries++;
                        
                        // JANGAN ulangi (retry) jika error disebabkan oleh masalah fatal seperti kunci salah atau dilarang
                        if (error.message.includes("SALAH atau TIDAK VALID") || 
                            error.message.includes("Akses Ditolak") || 
                            error.message.includes("Format audio ditolak") ||
                            error.message.includes("Limit Kuota API")) {
                            throw error;
                        }

                        if (retries === maxRetries) throw error;
                        await new Promise(res => setTimeout(res, delays[retries - 1]));
                    }
                }
            };

            const handleGenerateAI = async () => {
                if (!audioFile) { setAlertMessage("Mohon upload file audio rekaman rapat."); return; }
                setIsGenerating(true); setStatusMessage("Menganalisis audio & melakukan transkripsi...");
                
                try {
                    const base64Audio = await fileToBase64(audioFile);
                    const transcript = await callGeminiAI("Tolong buatkan transkrip lengkap audio rapat ini dalam Bahasa Indonesia.", base64Audio);
                    
                    setStatusMessage("Menyusun notulensi terstruktur...");
                    const analysisPrompt = `Berdasarkan transkrip rapat berikut: "${transcript}", buatkan draf notulensi yang lengkap dan jelas.
                    Aturan:
                    1. Pembahasan: Poin-poin alur diskusi.
                    2. Arahan Pimpinan: Poin-poin instruksi spesifik.
                    3. Kesimpulan: Poin-poin keputusan final.
                    Format HANYA JSON: {"pembahasan": "• ...", "arahan": "• ...", "kesimpulan": "• ..."}`;

                    const analysisRaw = await callGeminiAI(analysisPrompt);
                    const jsonClean = analysisRaw.replace(/```json|```/gi, "").trim();
                    const res = JSON.parse(jsonClean);
                    
                    setFormData(prev => ({ ...prev, transkrip: transcript, pembahasan: res.pembahasan, arahanPimpinan: res.arahan, kesimpulan: res.kesimpulan }));
                    setStatusMessage("Pemrosesan Selesai!");
                } catch (error) {
                    setAlertMessage(`${error.message}`);
                } finally {
                    setIsGenerating(false); setTimeout(() => setStatusMessage(""), 3000);
                }
            };

            const downloadPDF = () => {
                if (typeof window.html2pdf === 'undefined') { setAlertMessage("Sistem PDF sedang disiapkan, coba lagi."); return; }
                const opt = {
                    margin: [10, 10, 10, 10], filename: `Notulen_${formData.acara || 'Rapat'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: paperSize, orientation: 'portrait' }
                };
                window.html2pdf().set(opt).from(reportRef.current).save();
            };

            const downloadWord = () => {
                const content = reportRef.current.innerHTML;
                const sourceHTML = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Notulen Rapat</title><style>@page { size: ${paperSize === 'legal' ? '215.9mm 355.6mm' : '210mm 297mm'}; margin: 2cm; } body { font-family: 'Bookman Old Style', serif; font-size: 12pt; color: black; background: white; }</style></head><body>${content}</body></html>`;
                const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
                const fileDownload = document.createElement("a");
                document.body.appendChild(fileDownload); fileDownload.href = source; fileDownload.download = `Notulen_${formData.acara || 'Rapat'}.doc`;
                fileDownload.click(); document.body.removeChild(fileDownload);
            };

            // ==========================================
            // VIEW RENDERERS
            // ==========================================

            if (authLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center text-cyan-400 bg-[#0a0f1d]">
                        <i className="ph ph-spinner ph-spin text-5xl"></i>
                    </div>
                );
            }

            // --- HALAMAN LOGIN ---
            if (!user && currentView === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-[#0a0f1d]">
                        <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[100px] pointer-events-none"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none"></div>

                        <div className="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-3xl w-full max-w-md shadow-[0_0_40px_rgba(0,0,0,0.5)] z-10">
                            <div className="text-center mb-8">
                                <div className="inline-flex bg-gradient-to-tr from-indigo-500 to-cyan-400 p-3 rounded-2xl shadow-lg shadow-cyan-500/30 mb-4">
                                    <i className="ph-fill ph-sparkle text-white text-3xl"></i>
                                </div>
                                <h1 className="text-3xl font-extrabold text-white tracking-wider">Notulensi<span className="text-cyan-400">.AI</span></h1>
                                <p className="text-slate-400 mt-2 text-sm font-medium">Aplikasi Pembuat Notulensi Otomatis</p>
                                <h2 className="text-white mt-6 text-2xl font-bold tracking-wide">Login</h2>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-5">
                                {authStatus.error && <div className="p-3 bg-red-500/10 border border-red-500/50 text-red-400 rounded-lg text-sm text-center font-medium leading-relaxed">{authStatus.error}</div>}
                                
                                <div>
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Email Address</label>
                                    <div className="relative">
                                        <i className="ph ph-envelope-simple absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                                        <input type="email" name="email" value={authForm.email} onChange={handleAuthInputChange} required className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder-slate-600" placeholder="admin@instansi.go.id" />
                                    </div>
                                </div>
                                
                                <div>
                                    <div className="flex justify-between items-center mb-2">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block">Password</label>
                                        <button type="button" onClick={() => setCurrentView('forgot')} className="text-xs text-cyan-400 hover:text-cyan-300 transition-colors">Lupa Password?</button>
                                    </div>
                                    <div className="relative">
                                        <i className="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                                        <input type="password" name="password" value={authForm.password} onChange={handleAuthInputChange} required className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder-slate-600" placeholder="••••••••" />
                                    </div>
                                </div>

                                <button type="submit" disabled={authStatus.loading} className="w-full bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] transition-all flex justify-center items-center gap-2 mt-4">
                                    {authStatus.loading ? <i className="ph ph-spinner ph-spin text-xl"></i> : <><i className="ph ph-sign-in text-lg"></i> Masuk Sistem</>}
                                </button>
                            </form>

                            <p className="text-center mt-6 text-slate-400 text-sm">
                                Pengguna baru? <button onClick={() => setCurrentView('signup')} className="text-cyan-400 font-bold hover:underline">Registrasi</button>
                            </p>
                        </div>
                    </div>
                );
            }

            // --- HALAMAN REGISTER ---
            if (!user && currentView === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-[#0a0f1d]">
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-600/20 rounded-full blur-[100px] pointer-events-none"></div>
                        <div className="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-3xl w-full max-w-md shadow-[0_0_40px_rgba(0,0,0,0.5)] z-10">
                            <div className="text-center mb-6">

                                        {statusMessage && (

                        </div>

                        <div className="flex flex-col gap-4">
                            <div className="bg-slate-800/40 backdrop-blur-xl border border-slate-700/50 p-4 rounded-2xl shadow-xl flex flex-col md:flex-row gap-3 justify-between items-center sticky top-4 z-10">
                                <h2 className="font-bold text-white flex items-center gap-2 text-sm tracking-wide">
                                    <i className="ph ph-file-text text-cyan-400 text-lg"></i> Live Preview Dokumen
                                </h2>
                                <div className="flex flex-wrap gap-2">
                                    <button onClick={handleSaveToFirebase} disabled={isSaving} className="bg-emerald-600/80 border border-emerald-500/50 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-emerald-500 shadow-lg">
                                        {isSaving ? <i className="ph ph-spinner ph-spin"></i> : <i className="ph ph-cloud-arrow-up"></i>} Simpan
                                    </button>
                                    <button onClick={downloadWord} className="bg-blue-600/80 border border-blue-500/50 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-blue-500 shadow-lg">
                                        <i className="ph ph-pencil-simple"></i> Ekspor Word
                                    </button>
                                    <button onClick={downloadPDF} className="bg-rose-600/80 border border-rose-500/50 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-rose-500 shadow-lg">
                                        <i className="ph ph-download-simple"></i> Ekspor PDF
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-900 p-4 md:p-8 rounded-3xl overflow-auto h-[85vh] border border-slate-700 shadow-inner custom-scrollbar flex justify-center relative">
                                <div id="document-area" ref={reportRef} style={{
                                    fontFamily: "'Bookman Old Style', 'Bookman', serif",
                                    fontSize: '12pt', lineHeight: '1.5', color: 'black', backgroundColor: 'white',
                                    minHeight: paperSize === 'legal' ? '355.6mm' : '297mm', width: paperSize === 'legal' ? '215.9mm' : '210mm',
                                    margin: '0 auto', padding: '20mm', boxShadow: '0 0 20px rgba(0,0,0,0.5)'
                                }}>
                                    <div className="flex items-center border-b-[3px] border-double border-black pb-4 mb-6">
                                        {instansiLogo ? (
                                            <img src={instansiLogo} alt="Logo" className="w-[90px] h-[90px] object-contain mr-6" />
                                        ) : (
                                            <div className="w-[90px] h-[90px] border-2 border-dashed border-slate-300 flex items-center justify-center mr-6 text-[8pt] text-slate-400 italic text-center leading-tight">Logo<br/>(Opsional)</div>
                                        )}
                                        <div className="flex-1 text-center">
                                            <h1 className="font-bold uppercase text-[14pt] leading-tight mb-1">{formData.instansiNama || 'NAMA INSTANSI ORGANISASI'}</h1>
                                            <p className="text-[10pt] leading-snug">{formData.instansiAlamat || 'Alamat Lengkap Instansi / Organisasi'}</p>
                                        </div>
                                    </div>

                                    <div className="text-center mb-8">
                                        <h2 className="font-bold uppercase text-[14pt] underline">NOTULEN RAPAT</h2>
                                    </div>

                                    <div className="mb-8">
                                        <table className="w-full border-collapse">
                                            <tbody className="align-top">
                                                <tr><td className="w-[180px] py-1">Hari / Tanggal</td><td className="w-4 py-1">:</td><td className="py-1">{formData.tanggal || '-'}</td></tr>
                                                <tr><td className="py-1">Tempat</td><td className="py-1">:</td><td className="py-1">{formData.tempat || '-'}</td></tr>
                                                <tr><td className="py-1">Acara</td><td className="py-1">:</td><td className="py-1">{formData.acara || '-'}</td></tr>
                                                <tr><td className="py-1">Pimpinan Rapat</td><td className="py-1">:</td><td className="py-1">{formData.pimpinan || '-'}</td></tr>
                                                <tr><td className="py-1">Pencatat</td><td className="py-1">:</td><td className="py-1">{formData.pencatat || '-'}</td></tr>
                                                <tr><td className="py-1">Peserta Hadir</td><td className="py-1">:</td><td className="py-1 whitespace-pre-wrap">{formData.peserta ? formData.peserta.replace(/\n/g, ', ') : '-'}</td></tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="mb-6">
                                        <h3 className="font-bold underline mb-2 uppercase text-[12pt]">I. Pembahasan:</h3>
                                        <div className="text-justify whitespace-pre-wrap pl-2 leading-relaxed">{formData.pembahasan || "• Belum ada data pembahasan."}</div>
                                    </div>

                                    <div className="mb-6">
                                        <h3 className="font-bold underline mb-2 uppercase text-[12pt]">II. Arahan Pimpinan Rapat:</h3>
                                        <div className="text-justify whitespace-pre-wrap pl-2 leading-relaxed">{formData.arahanPimpinan || "• Belum ada data arahan pimpinan."}</div>
                                    </div>

                                    <div className="mb-12">
                                        <h3 className="font-bold underline mb-2 uppercase text-[12pt]">III. Kesimpulan:</h3>
                                        <div className="text-justify whitespace-pre-wrap pl-2 leading-relaxed">{formData.kesimpulan || "• Belum ada data kesimpulan."}</div>
                                    </div>

                                    <div className="grid grid-cols-2 mt-20 break-inside-avoid">
                                        <div className="text-center">
                                            <p className="mb-24">Pimpinan Rapat,</p>
                                            <p className="font-bold underline uppercase">{formData.pimpinan || '........................'}</p>
                                        </div>
                                        <div className="text-center">
                                            <p className="mb-24">Notulis,</p>
                                            <p className="font-bold underline uppercase">{formData.pencatat || '........................'}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="max-w-[1450px] mx-auto relative z-10 bg-slate-800/40 backdrop-blur-xl rounded-3xl shadow-xl border border-slate-700/50 p-6 md:p-10 min-h-[60vh]">
                            <h2 className="text-2xl font-bold text-white mb-8 flex items-center gap-3">
                                <i className="ph ph-clock-counter-clockwise text-cyan-400 text-3xl"></i> Riwayat Notulensi Tersimpan
                            </h2>
                            
                            {isLoadingHistory ? (
                                <div className="flex justify-center items-center py-20 text-cyan-400">
                                    <i className="ph ph-spinner ph-spin text-5xl"></i>
                                </div>
                            ) : historyRecords.length === 0 ? (
                                <div className="text-center py-20">
                                    <div className="bg-slate-800/50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-700/50">
                                        <i className="ph ph-file-text text-slate-500 text-4xl"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-300 mb-2">Belum ada riwayat tersimpan</h3>
                                    <p className="text-slate-500">Notulensi yang Anda simpan akan muncul di sini.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {historyRecords.map(record => (
                                        <div key={record.id} className="bg-slate-900/50 p-6 rounded-2xl border border-slate-700 hover:border-cyan-500/50 hover:shadow-[0_0_20px_rgba(6,182,212,0.15)] transition-all group relative overflow-hidden flex flex-col justify-between h-full">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-cyan-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                            
                                            <div>
                                                <h3 className="font-bold text-white text-lg mb-1 line-clamp-2" title={record.acara}>{record.acara || "Agenda Tidak Berjudul"}</h3>
                                                <p className="text-xs text-cyan-400 mb-4 font-mono font-medium">{record.tanggal || "Tanggal Kosong"}</p>
                                                
                                                <div className="space-y-2 mb-6">
                                                    <p className="text-sm text-slate-400 truncate flex items-center gap-2">
                                                        <i className="ph ph-buildings text-slate-500"></i> {record.instansiNama || "-"}
                                                    </p>
                                                    <p className="text-sm text-slate-400 truncate flex items-center gap-2">
                                                        <i className="ph ph-user text-slate-500"></i> {record.pimpinan || "-"}
                                                    </p>
                                                </div>
                                            </div>
                                            
                                            <button onClick={() => {
                                                setFormData(record);
                                                setAudioFile(null); 
                                                setAudioUrl(null);
                                                setParticipantInput("");
                                                setActiveTab('create');
                                            }} className="w-full bg-slate-800 hover:bg-cyan-600 text-white py-2.5 rounded-xl text-sm font-bold transition-colors flex justify-center items-center gap-2">
                                                <i className="ph ph-pencil-simple text-lg"></i> Buka Notulensi
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
