<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notulensi.AI</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- html2pdf untuk Ekspor PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel untuk Compile JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }
        input[type="date"].color-scheme-dark::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
    </style>
</head>
<body class="bg-[#0a0f1d] text-slate-200 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // ==========================================
        // KONFIGURASI WEBHOOK GOOGLE SCRIPT & ADMIN WA
        // ==========================================
        // PASTE-KAN URL DEPLOYMENT BARU ANDA DI SINI
        const GOOGLE_SHEETS_WEBHOOK = "https://script.google.com/macros/s/AKfycbw3o0dC843svVbltYm8yX9Xhvp1JFfQ72j_z8AjaRKfNrifDwBtMc2BBmjhsyGduDrOCA/exec";
        const ADMIN_WA_NUMBER = "6287838960454"; 

        // ==========================================
        // KONFIGURASI FIREBASE CLOUD DATABASE
        // ==========================================
        var firebaseConfig = {
          apiKey: "AIzaSyDIFoeUci332xSwxiBbO4_ahSwnjtTEEyA",
          authDomain: "notulensi-9e39d.firebaseapp.com",
          projectId: "notulensi-9e39d",
          storageBucket: "notulensi-9e39d.firebasestorage.app",
          messagingSenderId: "600963416044",
          appId: "1:600963416044:web:8e294ca558915c9d184ac9"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'notulensi-ai-app';

        function App() {
          // --- STATE AUTENTIKASI (FIREBASE) ---
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [currentView, setCurrentView] = useState('login'); 
          const [authForm, setAuthForm] = useState({ name: '', email: '', password: '', accessCode: '' });
          const [authStatus, setAuthStatus] = useState({ loading: false, error: '', success: '' });
          
          // Menggunakan Gemini 1.5 Flash sebagai default agar hemat kuota
          const [aiModel, setAiModel] = useState("gemini-1.5-flash"); 

          // --- STATE APLIKASI UTAMA ---
          const [activeTab, setActiveTab] = useState('create'); 
          const [historyRecords, setHistoryRecords] = useState([]);
          const [isLoadingHistory, setIsLoadingHistory] = useState(false);

          const [formData, setFormData] = useState({
            instansiNama: '', instansiAlamat: '', tanggal: '', tempat: '', acara: '', pimpinan: '',
            pencatat: '', peserta: '', transkrip: '', pembahasan: '', arahanPimpinan: '', kesimpulan: ''
          });
          const [paperSize, setPaperSize] = useState('a4');
          const [participantInput, setParticipantInput] = useState("");
          const [instansiLogo, setInstansiLogo] = useState(null);
          const [audioFile, setAudioFile] = useState(null);
          const [audioUrl, setAudioUrl] = useState(null);
          const [isGenerating, setIsGenerating] = useState(false);
          const [isSaving, setIsSaving] = useState(false); 
          const [statusMessage, setStatusMessage] = useState("");
          const [alertMessage, setAlertMessage] = useState(null);
          const reportRef = useRef(null);

          // --- INITIALIZATION (FIREBASE AUTH) ---
          useEffect(() => {
            const unsubscribe = auth.onAuthStateChanged((currentUser) => {
              if (currentUser) {
                setUser({ 
                    uid: currentUser.uid, 
                    email: currentUser.email, 
                    name: currentUser.displayName || authForm.name || "Pengguna" 
                });
                setCurrentView('app');
                setAuthStatus({ loading: false, error: '', success: '' });
              } else {
                setUser(null);
                setCurrentView('login');
              }
              setAuthLoading(false);
            });
            return () => unsubscribe();
          }, []);

          // --- FETCH RIWAYAT DARI FIREBASE CLOUD ---
          useEffect(() => {
            if (!user) return;
            setIsLoadingHistory(true);
            
            const recordsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notulensi_records');
            const unsubscribe = recordsRef.onSnapshot((snapshot) => {
                const records = [];
                snapshot.forEach((doc) => {
                    records.push({ id: doc.id, ...doc.data() });
                });
                
                records.sort((a, b) => {
                    const timeA = a.savedAt?.toMillis() || 0;
                    const timeB = b.savedAt?.toMillis() || 0;
                    return timeB - timeA;
                });
                
                setHistoryRecords(records);
                setIsLoadingHistory(false);
            }, (error) => {
                console.error("Fetch history error:", error);
                setIsLoadingHistory(false);
            });

            return () => unsubscribe();
          }, [user]);

          // --- HANDLER AUTENTIKASI ---
          const handleAuthInputChange = (e) => {
            setAuthForm({ ...authForm, [e.target.name]: e.target.value });
            setAuthStatus({ loading: false, error: '', success: '' });
          };

          const handleLogin = async (e) => {
            e.preventDefault();
            setAuthStatus({ loading: true, error: '', success: '' });
            
            try {
                await auth.signInWithEmailAndPassword(authForm.email, authForm.password);
            } catch (error) {
                let errorMsg = "Login gagal: Email atau password salah.";
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') errorMsg = 'Email atau password yang Anda masukkan salah.';
                if (error.code === 'auth/user-not-found') errorMsg = 'Akun tidak ditemukan. Silakan registrasi terlebih dahulu.';
                setAuthStatus({ loading: false, error: errorMsg, success: '' });
            }
          };

          const handleSignup = async (e) => {
            e.preventDefault();
            setAuthStatus({ loading: true, error: '', success: '' });

            // 1. Verifikasi Kode Akses ke Google Sheets
            let isCodeValid = false;
            try {
              const verifyUrl = `${GOOGLE_SHEETS_WEBHOOK}?action=verifyCode&code=${encodeURIComponent(authForm.accessCode)}`;
              const verifyRes = await fetch(verifyUrl);
              
              if (verifyRes.ok) {
                const verifyData = await verifyRes.json();
                isCodeValid = verifyData.valid;
              } else {
                throw new Error("Server response not ok");
              }
            } catch (err) {
              console.warn("Koneksi Webhook gagal. Menggunakan verifikasi lokal.", err);
              if (authForm.accessCode === "NOTULENSI2026") {
                isCodeValid = true;
              }
            }

            if (!isCodeValid) {
              setAuthStatus({ loading: false, error: 'Kode Akses salah atau tidak valid! Silakan hubungi Admin.', success: '' });
              return;
            }

            try {
                // 2. Daftar Akun di Firebase
                const userCredential = await auth.createUserWithEmailAndPassword(authForm.email, authForm.password);
                const newUser = userCredential.user;

                // 3. Simpan Nama Profil
                await newUser.updateProfile({ displayName: authForm.name });

                // 4. Buat Database Profil di Firestore
                await db.collection('artifacts').doc(appId).collection('users').doc(newUser.uid).collection('profile').doc('data').set({
                    name: authForm.name,
                    email: authForm.email,
                    role: 'user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 5. Rekap Data Pengguna ke Google Sheets
                try {
                  const syncUrl = `${GOOGLE_SHEETS_WEBHOOK}?action=register&name=${encodeURIComponent(authForm.name)}&email=${encodeURIComponent(authForm.email)}&date=${encodeURIComponent(new Date().toLocaleString('id-ID'))}&uid=${encodeURIComponent(newUser.uid)}`;
                  fetch(syncUrl, { mode: 'no-cors' }); 
                } catch (sheetErr) {
                  console.warn("Gagal merekap ke Google Sheets.", sheetErr);
                }

                setAuthStatus({ loading: false, error: '', success: '' });
            } catch (error) {
                let errorMsg = `Gagal: ${error.message}`;
                if (error.code === 'auth/email-already-in-use') errorMsg = 'Email ini sudah terdaftar. Silakan gunakan email lain atau Login.';
                if (error.code === 'auth/weak-password') errorMsg = 'Password terlalu lemah (Minimal 6 karakter).';
                setAuthStatus({ loading: false, error: errorMsg, success: '' });
            }
          };

          const handleForgotPassword = async (e) => {
              e.preventDefault();
              setAuthStatus({ loading: true, error: '', success: '' });
              try {
                  await auth.sendPasswordResetEmail(authForm.email);
                  setAuthStatus({ loading: false, error: '', success: 'Tautan reset password telah dikirim ke email Anda. Silakan cek Inbox/Spam.' });
              } catch (error) {
                  setAuthStatus({ loading: false, error: 'Gagal mengirim email reset. Pastikan email terdaftar di sistem.', success: '' });
              }
          };

          const handleLogout = async () => {
            try {
                await auth.signOut();
                setAuthForm({ name: '', email: '', password: '', accessCode: '' });
            } catch (error) {
                console.error("Logout Error", error);
            }
          };

          const handleSaveToCloud = async () => {
            if (!user) {
              setAlertMessage("Sesi telah habis. Silakan keluar dan masuk kembali.");
              return;
            }
            if (!formData.acara && !formData.pembahasan) {
              setAlertMessage("Data notulensi masih kosong. Silakan proses AI terlebih dahulu.");
              return;
            }

            setIsSaving(true);
            try {
                const notulensiRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notulensi_records');
                await notulensiRef.add({
                    ...formData,
                    aiModelUsed: aiModel,
                    savedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    tanggalSimpan: new Date().toLocaleString('id-ID')
                });
                setAlertMessage("Notulensi berhasil disimpan secara aman di Cloud Database.");
            } catch (error) {
                console.error("Firebase Save Error: ", error);
                setAlertMessage(`Gagal menyimpan data: ${error.message}`);
            } finally {
                setIsSaving(false);
            }
          };

          const handleNewRecord = () => {
            setFormData({
              instansiNama: '', instansiAlamat: '', tanggal: '', tempat: '', acara: '', pimpinan: '',
              pencatat: '', peserta: '', transkrip: '', pembahasan: '', arahanPimpinan: '', kesimpulan: ''
            });
            setAudioFile(null);
            setAudioUrl(null);
            setInstansiLogo(null);
            setParticipantInput("");
            setActiveTab('create');
          };

          const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

          const handleAddParticipant = () => {
            if (!participantInput.trim()) return;
            const currentList = formData.peserta ? formData.peserta.split('\n').filter(p => p.trim() !== '') : [];
            setFormData(prev => ({ ...prev, peserta: [...currentList, participantInput.trim()].join('\n') }));
            setParticipantInput("");
          };

          const handleDeleteParticipant = (index) => {
            const currentList = formData.peserta ? formData.peserta.split('\n').filter(p => p.trim() !== '') : [];
            setFormData(prev => ({ ...prev, peserta: currentList.filter((_, i) => i !== index).join('\n') }));
          };

          const handleLogoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => setInstansiLogo(reader.result);
              reader.readAsDataURL(file);
            }
          };

          const handleAudioUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              if (file.size > 25 * 1024 * 1024) {
                setAlertMessage("Ukuran file terlalu besar! Maksimal adalah 25 MB.");
                e.target.value = null; return;
              }
              const audioTag = document.createElement('audio');
              audioTag.src = URL.createObjectURL(file);
              audioTag.onloadedmetadata = () => {
                if (audioTag.duration > 15 * 60) {
                  setAlertMessage("Durasi audio terlalu panjang! Maksimal durasi 15 menit.");
                  setAudioFile(null); setAudioUrl(null); e.target.value = null;
                } else {
                  setAudioFile(file); setAudioUrl(audioTag.src);
                }
              };
            }
          };

          const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
          });

          // =========================================================================
          // ARSITEKTUR AMAN: MEMANGGIL AI MELALUI GOOGLE APPS SCRIPT (TANPA ERROR VERCEL)
          // =========================================================================
          const callGeminiAI = async (prompt, audioData = null) => {
            let retries = 0; 
            const maxRetries = 5; 
            const delays = [5000, 10000, 15000, 20000, 20000];

            if (!GOOGLE_SHEETS_WEBHOOK || GOOGLE_SHEETS_WEBHOOK === "") {
              throw new Error("URL Google Apps Script belum diatur.");
            }

            const payload = {
                action: 'generateAI',
                prompt: prompt,
                preferredModel: aiModel
            };

            if (audioData) {
                payload.audioData = {
                    mimeType: audioFile.type || "audio/mpeg",
                    data: audioData
                };
            }

            while (retries < maxRetries) {
              try {
                const response = await fetch(GOOGLE_SHEETS_WEBHOOK, {
                  method: 'POST',
                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                  body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                  throw new Error(`HTTP Error ${response.status}. Gagal menghubungi Apps Script.`);
                }
                
                const resData = await response.json();

                if (!resData.success) {
                   if (resData.error && resData.error.includes("429")) {
                      throw new Error("ERROR_429");
                   }
                   throw new Error(resData.error || "Gagal memproses data AI di server backend.");
                }

                return resData.text; 

              } catch (error) {
                retries++;
                
                // Jangan ulangi loop untuk error fatal atau kunci salah
                if (error.message.includes("tidak valid") || error.message.includes("belum diatur")) {
                  throw error;
                }

                if (error.message === "ERROR_429") {
                  if (retries === maxRetries) {
                    throw new Error("<b>Server Sedang Penuh (Error 429).</b><br/><br/>Jatah API gratis Anda sudah melampaui batas harian.<br/>Gunakan Kunci API yang baru di backend Apps Script Anda.");
                  }
                  setStatusMessage(`Menunggu antrean server (Tahap ${retries})...`);
                  await new Promise(res => setTimeout(res, delays[retries - 1]));
                  continue;
                }

                if (retries === maxRetries) throw error;
                await new Promise(res => setTimeout(res, 2000));
              }
            }
          };

          const handleGenerateAI = async () => {
            if (!audioFile) { setAlertMessage("Mohon upload file audio rekaman rapat."); return; }
            setIsGenerating(true); setStatusMessage("Menghubungkan ke Server Eksternal...");
            
            try {
              const base64Audio = await fileToBase64(audioFile);
              setStatusMessage("Menganalisis audio & melakukan transkripsi (Bisa memakan waktu 1-2 menit)...");
              const transcript = await callGeminiAI("Tolong buatkan transkrip lengkap audio rapat ini dalam Bahasa Indonesia.", base64Audio);
              
              setStatusMessage("Menyusun notulensi terstruktur...");
              const analysisPrompt = `Berdasarkan transkrip rapat berikut: "${transcript}", buatkan draf notulensi yang lengkap dan jelas.
              Aturan:
              1. Pembahasan: Poin-poin alur diskusi.
              2. Arahan Pimpinan: Poin-poin instruksi spesifik.
              3. Kesimpulan: Poin-poin keputusan final.
              Format HANYA JSON: {"pembahasan": "• ...", "arahan": "• ...", "kesimpulan": "• ..."}`;

              const analysisRaw = await callGeminiAI(analysisPrompt);
              const jsonClean = analysisRaw.replace(/```json|```/gi, "").trim();
              const res = JSON.parse(jsonClean);
              
              setFormData(prev => ({ ...prev, transkrip: transcript, pembahasan: res.pembahasan, arahanPimpinan: res.arahan, kesimpulan: res.kesimpulan }));
              setStatusMessage("Pemrosesan Selesai!");
            } catch (error) {
              setAlertMessage(`${error.message}`);
            } finally {
              setIsGenerating(false); setTimeout(() => setStatusMessage(""), 3000);
            }
          };

          const downloadPDF = () => {
            if (typeof window.html2pdf === 'undefined') { setAlertMessage("Sistem PDF sedang disiapkan, coba lagi."); return; }
            const opt = {
              margin: [10, 10, 10, 10], filename: `Notulen_${formData.acara || 'Rapat'}.pdf`,
              image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true },
              jsPDF: { unit: 'mm', format: paperSize, orientation: 'portrait' }
            };
            window.html2pdf().set(opt).from(reportRef.current).save();
          };

          const downloadWord = () => {
            const content = reportRef.current.innerHTML;
            const sourceHTML = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Notulen Rapat</title><style>@page { size: ${paperSize === 'legal' ? '215.9mm 355.6mm' : '210mm 297mm'}; margin: 2cm; } body { font-family: 'Bookman Old Style', serif; font-size: 12pt; color: black; background: white; }</style></head><body>${content}</body></html>`;
            const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
            const fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload); fileDownload.href = source; fileDownload.download = `Notulen_${formData.acara || 'Rapat'}.doc`;
            fileDownload.click(); document.body.removeChild(fileDownload);
          };

          // ==========================================
          // VIEW RENDERERS 
          // ==========================================

          if (authLoading) {
            return (
              <div className="min-h-screen bg-[#0a0f1d] flex items-center justify-center text-cyan-400">
                <i className="ph ph-spinner ph-spin text-5xl"></i>
              </div>
            );
          }

          // --- HALAMAN LOGIN ---
          if (!user && currentView === 'login') {
            return (
              <div className="min-h-screen bg-[#0a0f1d] flex items-center justify-center p-4 relative overflow-hidden font-sans">
                <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[100px] pointer-events-none"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none"></div>

                <div className="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-3xl w-full max-w-md shadow-[0_0_40px_rgba(0,0,0,0.5)] z-10">
                  <div className="text-center mb-8">
                    <div className="inline-flex bg-gradient-to-tr from-indigo-500 to-cyan-400 p-3 rounded-2xl shadow-lg shadow-cyan-500/30 mb-4">
                      <i className="ph-fill ph-sparkle text-white text-3xl"></i>
                    </div>
                    <h1 className="text-3xl font-extrabold text-white tracking-wider">Notulensi<span className="text-cyan-400">.AI</span></h1>
                    <p className="text-slate-400 mt-2 text-sm font-medium">Aplikasi Pembuat Notulensi Otomatis</p>
                    <h2 className="text-white mt-6 text-2xl font-bold tracking-wide">Login</h2>
                  </div>

                  <form onSubmit={handleLogin} className="space-y-5">
                    {authStatus.error && <div className="p-3 bg-red-500/10 border border-red-500/50 text-red-400 rounded-lg text-sm text-center font-medium leading-relaxed">{authStatus.error}</div>}
                    
                    <div>
                      <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Email Address</label>
                      <div className="relative">
                        <i className="ph ph-envelope-simple absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                        <input type="email" name="email" value={authForm.email} onChange={handleAuthInputChange} required className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder-slate-600" placeholder="admin@instansi.go.id" />
                      </div>
                    </div>
                    
                    <div>
                      <div className="flex justify-between items-center mb-2">
                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block">Password</label>
                        <button type="button" onClick={() => setCurrentView('forgot')} className="text-xs text-cyan-400 hover:text-cyan-300 transition-colors">Lupa Password?</button>
                      </div>
                      <div className="relative">
                        <i className="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                        <input type="password" name="password" value={authForm.password} onChange={handleAuthInputChange} required className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder-slate-600" placeholder="••••••••" />
                      </div>
                    </div>

                    <button type="submit" disabled={authStatus.loading} className="w-full bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] transition-all flex justify-center items-center gap-2 mt-4">
                      {authStatus.loading ? <i className="ph ph-spinner ph-spin text-xl"></i> : <><i className="ph ph-sign-in text-lg"></i> Masuk Sistem</>}
                    </button>
                  </form>

                  <p className="text-center mt-6 text-slate-400 text-sm">
                      Belum punya akun? <button onClick={() => setCurrentView('signup')} className="text-cyan-400 font-bold hover:underline">Registrasi</button>
                  </p>
                </div>
              </div>
            );
          }

          // --- HALAMAN REGISTRASI ---
          if (!user && currentView === 'signup') {
            return (
              <div className="min-h-screen bg-[#0a0f1d] flex items-center justify-center p-4 relative overflow-hidden font-sans">
                <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-600/20 rounded-full blur-[100px] pointer-events-none"></div>
                <div className="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-3xl w-full max-w-md shadow-[0_0_40px_rgba(0,0,0,0.5)] z-10">
                  <div className="text-center mb-6">
                    <div className="inline-flex bg-gradient-to-tr from-indigo-500 to-cyan-400 p-2 rounded-2xl shadow-lg shadow-cyan-500/30 mb-3">
                      <i className="ph-fill ph-sparkle text-white text-2xl"></i>
                    </div>
                    <h1 className="text-2xl font-extrabold text-white tracking-wider">Notulensi<span className="text-cyan-400">.AI</span></h1>
                    <p className="text-slate-400 mt-1 text-xs font-medium">Aplikasi Pembuat Notulensi Otomatis</p>
                    <h2 className="text-white mt-5 text-xl font-bold tracking-wide">Registrasi</h2>
                  </div>

                  <form onSubmit={handleSignup} className="space-y-4">
                    {authStatus.error && <div className="p-3 bg-red-500/10 border border-red-500/50 text-red-400 rounded-lg text-sm text-center font-medium leading-relaxed">{authStatus.error}</div>}
                    
                    <div>
                      <div className="relative">
                        <i className="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                        <input type="text" name="name" value={authForm.name} onChange={handleAuthInputChange} required className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 text-sm" placeholder="Nama Lengkap" />
                      </div>
                    </div>

                    <div>
                      <div className="relative">
                        <i className="ph ph-envelope-simple absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                        <input type="email" name="email" value={authForm.email} onChange={handleAuthInputChange} required className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 text-sm" placeholder="Alamat Email" />
                      </div>
                    </div>

                    <div>
                      <div className="relative">
                        <i className="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                        <input type="password" name="password" value={authForm.password} onChange={handleAuthInputChange} required minLength="6" className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 text-sm" placeholder="Password (Min. 6 Karakter)" />
                      </div>
                    </div>
                    
                    <div className="pt-2 border-t border-slate-700/50 mt-2">
                      <label className="text-[10px] font-bold text-cyan-400 uppercase tracking-wider block mb-2 flex items-center gap-1"><i className="ph ph-shield-check text-xs"></i> Otorisasi Keamanan</label>
                      <div className="relative mb-3">
                        <i className="ph ph-key absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                        <input type="text" name="accessCode" value={authForm.accessCode} onChange={handleAuthInputChange} required className="w-full bg-slate-900/80 border border-cyan-900/50 text-cyan-300 rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 font-mono tracking-widest text-center uppercase" placeholder="MASUKKAN KODE AKSES" />
                      </div>
                    </div>

                    <button type="submit" disabled={authStatus.loading} className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(124,58,237,0.3)] transition-all flex justify-center items-center gap-2 mt-2">
                      {authStatus.loading ? <i className="ph ph-spinner ph-spin text-xl"></i> : <><i className="ph ph-user-plus text-lg"></i> Daftar Akun</>}
                    </button>
                  </form>

                  <p className="text-center mt-6 text-slate-400 text-sm">
                      Sudah punya akun? <button onClick={() => setCurrentView('login')} className="text-indigo-400 font-bold hover:underline">Login</button>
                  </p>
                </div>
              </div>
            );
          }

          // --- HALAMAN LUPA PASSWORD ---
          if (!user && currentView === 'forgot') {
              return (
                  <div className="min-h-screen bg-[#0a0f1d] flex items-center justify-center p-4 relative overflow-hidden font-sans">
                      <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-rose-600/10 rounded-full blur-[100px] pointer-events-none"></div>
                      <div className="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-3xl w-full max-w-md shadow-[0_0_40px_rgba(0,0,0,0.5)] z-10">
                          <div className="text-center mb-8">
                              <h1 className="text-3xl font-extrabold text-white tracking-wider">Notulensi<span className="text-cyan-400">.AI</span></h1>
                              <p className="text-slate-400 mt-2 text-sm font-medium">Aplikasi Pembuat Notulensi Otomatis</p>
                              <h2 className="text-white mt-6 text-2xl font-bold tracking-wide">Lupa Password</h2>
                              <p className="text-slate-400 text-sm mt-2">Masukkan email Anda untuk menerima tautan reset password dari Firebase.</p>
                          </div>

                          <form onSubmit={handleForgotPassword} className="space-y-5">
                              {authStatus.error && <div className="p-3 bg-red-500/10 border border-red-500/50 text-red-400 rounded-lg text-sm text-center">{authStatus.error}</div>}
                              {authStatus.success && <div className="p-3 bg-emerald-500/10 border border-emerald-500/50 text-emerald-400 rounded-lg text-sm text-center">{authStatus.success}</div>}
                              
                              <div className="relative">
                                  <i className="ph ph-envelope-simple absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                                  <input type="email" name="email" value={authForm.email} onChange={handleAuthInputChange} required className="w-full bg-[#111827]/80 border border-slate-700/50 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" placeholder="Masukkan Email Anda" />
                              </div>

                              <button type="submit" disabled={authStatus.loading} className="w-full bg-gradient-to-r from-slate-700 to-slate-600 hover:from-slate-600 hover:to-slate-500 text-white font-bold py-3.5 rounded-xl transition-all flex justify-center items-center gap-2">
                                  {authStatus.loading ? <i className="ph ph-spinner ph-spin text-xl"></i> : <><i className="ph-fill ph-paper-plane-tilt text-lg"></i> Kirim Link Reset</>}
                              </button>
                          </form>

                          <div className="mt-4 border-t border-white/10 pt-4">
                              <a href={`https://wa.me/${ADMIN_WA_NUMBER}?text=Halo%20Admin,%20saya%20ingin%20meminta%20bantuan%20terkait%20akun%20Notulensi.AI%20saya.`} target="_blank" rel="noreferrer" className="w-full bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/40 border border-emerald-600/30 py-2.5 rounded-xl text-xs font-semibold transition-colors flex justify-center items-center gap-2">
                                  <i className="ph-fill ph-whatsapp-logo text-lg"></i> Bantuan Manual via WhatsApp Admin
                              </a>
                          </div>

                          <button onClick={() => setCurrentView('login')} className="w-full mt-6 py-2 text-slate-400 hover:text-white text-sm transition-colors">
                              &larr; Kembali ke halaman Login
                          </button>
                      </div>
                  </div>
              );
          }

          // --- HALAMAN APLIKASI UTAMA (DASHBOARD) ---
          return (
            <div className="min-h-screen bg-[#0a0f1d] text-slate-200 p-4 md:p-8 font-sans relative overflow-hidden">
              {/* Background Ambient Glow */}
              <div className="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden">
                <div className="absolute top-[-20%] left-[-10%] w-[800px] h-[800px] bg-indigo-900/20 rounded-full blur-[120px]"></div>
                <div className="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-cyan-900/10 rounded-full blur-[100px]"></div>
              </div>

              {/* Modal Custom */}
              {alertMessage && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 backdrop-blur-md">
                  <div className="bg-[#1e293b] border border-slate-600 rounded-2xl shadow-2xl p-6 max-w-sm w-full animate-in fade-in zoom-in duration-200">
                    <div className="flex items-center gap-3 text-rose-400 mb-4">
                      <i className="ph-fill ph-warning-circle text-2xl"></i>
                      <h3 className="font-bold text-lg text-white">Informasi Sistem</h3>
                    </div>
                    <div className="text-slate-300 mb-6 leading-relaxed text-sm" dangerouslySetInnerHTML={{ __html: alertMessage }}></div>
                    <button onClick={() => setAlertMessage(null)} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2.5 rounded-xl transition-colors">
                      Mengerti
                    </button>
                  </div>
                </div>
              )}

              {/* Navbar Minimalis */}
              <div className="max-w-[1450px] mx-auto relative z-10 flex justify-between items-center mb-10 bg-white/5 border border-white/10 backdrop-blur-xl rounded-2xl p-4 px-6 shadow-lg">
                <div className="flex items-center gap-3">
                  <div className="bg-gradient-to-tr from-indigo-500 to-cyan-400 p-2 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                    <i className="ph-fill ph-sparkle text-white text-xl"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-extrabold text-white tracking-wide">Notulensi<span className="text-cyan-400">.AI</span></h1>
                    <p className="text-xs text-cyan-500/80 font-mono tracking-widest hidden sm:block">SERVER_GAS_BRIDGE // VER 3.0</p>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <span className="text-sm text-slate-400 hidden sm:inline-block"><i className="ph ph-user inline text-sm mr-1"></i> {user?.name || "Guest"}</span>
                  <button onClick={handleLogout} className="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-2">
                    <i className="ph ph-sign-out text-base"></i> <span className="hidden sm:inline">Keluar</span>
                  </button>
                </div>
              </div>

              {/* Tab Menu & Buat Baru */}
              <div className="max-w-[1450px] mx-auto relative z-10 flex flex-wrap justify-between items-center mb-6 gap-4">
                <div className="bg-slate-800/50 p-1 rounded-xl backdrop-blur-md border border-slate-700/50 flex gap-1">
                  <button onClick={() => setActiveTab('create')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'create' ? 'bg-cyan-500 text-slate-900 shadow-lg' : 'text-slate-400 hover:text-white'}`}><i className="ph ph-pencil-simple text-base"></i> Editor AI</button>
                  <button onClick={() => setActiveTab('history')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'history' ? 'bg-cyan-500 text-slate-900 shadow-lg' : 'text-slate-400 hover:text-white'}`}><i className="ph ph-clock-counter-clockwise text-base"></i> Riwayat Saya</button>
                </div>
                <button onClick={handleNewRecord} className="bg-emerald-500/20 hover:bg-emerald-500/40 text-emerald-400 border border-emerald-500/30 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-2">
                  <i className="ph ph-plus text-base"></i> <span className="hidden sm:inline">Buat Baru</span>
                </button>
              </div>

              {activeTab === 'create' && (
              <div className="max-w-[1450px] mx-auto relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                {/* PANEL KIRI: INPUT DATA */}
                <div className="space-y-6 overflow-y-auto max-h-[85vh] pr-2 custom-scrollbar pb-10">
                  
                  <div className="bg-slate-800/40 backdrop-blur-xl rounded-3xl shadow-xl border border-slate-700/50 p-6">
                    <div className="flex items-center gap-3 mb-6 border-b border-slate-700/50 pb-4">
                      <div className="bg-indigo-500/20 p-2 rounded-lg text-indigo-400 border border-indigo-500/30">
                        <i className="ph ph-buildings text-xl"></i>
                      </div>
                      <h2 className="text-lg font-bold text-white tracking-wide">Data Parameter Rapat</h2>
                    </div>

                    <div className="space-y-5">
                      {/* Pengaturan Kertas */}
                      <div className="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 flex justify-between items-center">
                        <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                          <i className="ph ph-gear text-cyan-500 text-sm"></i> Format Cetak
                        </h2>
                        <div className="flex gap-4">
                          <label className="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="paperSize" value="a4" checked={paperSize === 'a4'} onChange={() => setPaperSize('a4')} className="w-4 h-4 text-cyan-500 bg-slate-800 border-slate-600 focus:ring-cyan-500 focus:ring-offset-slate-900" />
                            <span className={`text-sm ${paperSize === 'a4' ? 'font-bold text-cyan-400' : 'text-slate-400'}`}>A4 Format</span>
                          </label>
                          <label className="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="paperSize" value="legal" checked={paperSize === 'legal'} onChange={() => setPaperSize('legal')} className="w-4 h-4 text-cyan-500 bg-slate-800 border-slate-600 focus:ring-cyan-500 focus:ring-offset-slate-900" />
                            <span className={`text-sm ${paperSize === 'legal' ? 'font-bold text-cyan-400' : 'text-slate-400'}`}>Legal Format</span>
                          </label>
                        </div>
                      </div>

                      {/* Kop Instansi */}
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="text-[10px] font-bold text-cyan-500 uppercase tracking-widest block mb-1">Logo Instansi</label>
                          <input type="file" accept="image/*" onChange={handleLogoUpload} className="text-xs w-full file:mr-2 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-indigo-500/20 file:text-indigo-300 hover:file:bg-indigo-500/30 text-slate-400 cursor-pointer transition-colors" />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-cyan-500 uppercase tracking-widest block mb-1">Nama Instansi Utama</label>
                          <input name="instansiNama" value={formData.instansiNama} onChange={handleInputChange} className="w-full p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-sm text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all placeholder-slate-600" placeholder="PEMERINTAH PROVINSI..." />
                        </div>
                        <div className="md:col-span-2">
                          <label className="text-[10px] font-bold text-cyan-500 uppercase tracking-widest block mb-1">Alamat Lengkap Kop</label>
                          <textarea name="instansiAlamat" value={formData.instansiAlamat} onChange={handleInputChange} className="w-full p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-sm text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all placeholder-slate-600 h-16 resize-none" placeholder="Jalan Jend. Sudirman No. 1..." />
                        </div>
                      </div>

                      {/* Detail Rapat */}
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-slate-700/50">
                        <div className="md:col-span-2">
                          <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Judul Agenda / Acara</label>
                          <input name="acara" value={formData.acara} onChange={handleInputChange} className="w-full p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="Rapat Koordinasi Evaluasi..." />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Tanggal</label>
                          <input type="date" name="tanggal" value={formData.tanggal} onChange={handleInputChange} className="w-full p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none color-scheme-dark" />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Lokasi Ruangan</label>
                          <input name="tempat" value={formData.tempat} onChange={handleInputChange} className="w-full p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="Ruang Rapat Utama" />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Pimpinan Rapat</label>
                          <input name="pimpinan" value={formData.pimpinan} onChange={handleInputChange} className="w-full p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="Nama & Gelar" />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Pencatat / Notulis</label>
                          <input name="pencatat" value={formData.pencatat} onChange={handleInputChange} className="w-full p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="Nama Notulis" />
                        </div>
                        
                        {/* Modul Peserta */}
                        <div className="md:col-span-2 pt-2">
                          <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Daftar Hadir (Peserta)</label>
                          <div className="flex gap-2 mb-3">
                            <input value={participantInput} onChange={(e) => setParticipantInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && (e.preventDefault(), handleAddParticipant())} className="flex-1 p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm text-white placeholder-slate-500" placeholder="Ketik nama lalu Enter..." />
                            <button onClick={handleAddParticipant} className="bg-indigo-600/80 text-white p-2.5 rounded-xl hover:bg-indigo-500 transition-colors border border-indigo-500/50 shadow-[0_0_10px_rgba(79,70,229,0.2)]" type="button"><i className="ph ph-plus text-xl"></i></button>
                          </div>
                          
                          <div className="flex flex-wrap gap-2 p-3 bg-slate-900/40 rounded-xl min-h-[60px] border border-slate-700/50">
                            {(!formData.peserta || formData.peserta.trim() === '') && <span className="text-xs text-slate-500 italic mt-1">Sistem belum mendeteksi peserta.</span>}
                            {formData.peserta && formData.peserta.split('\n').filter(p => p.trim() !== '').map((p, i) => (
                              <div key={i} className="bg-slate-800 border border-slate-600 text-cyan-100 px-3 py-1.5 rounded-lg text-xs flex items-center gap-2 shadow-sm">
                                <span>{p}</span>
                                <button onClick={() => handleDeleteParticipant(i)} className="text-slate-400 hover:text-rose-400 transition-colors"><i className="ph ph-x text-sm"></i></button>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>

                      {/* Pengaturan AI Engine */}
                      <div className="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-3 mt-4 border-t border-slate-700/50 pt-4">
                        <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                          <i className="ph-fill ph-sparkle text-purple-400 text-sm"></i> Versi Mesin AI Gemini
                        </h2>
                        <select 
                          value={aiModel} 
                          onChange={(e) => setAiModel(e.target.value)}
                          className="bg-slate-800 text-cyan-300 text-sm border border-slate-600 rounded-xl px-4 py-2 outline-none focus:border-cyan-500 transition-colors w-full md:w-auto cursor-pointer"
                        >
                          <option value="gemini-1.5-flash">Gemini 1.5 Flash (Cepat & Stabil)</option>
                          <option value="gemini-2.0-flash">Gemini 2.0 Flash (Seimbang)</option>
                          <option value="gemini-2.5-flash">Gemini 2.5 Flash (Tercanggih)</option>
                        </select>
                      </div>

                      {/* Modul Audio */}
                      <div className="bg-gradient-to-br from-indigo-900/20 to-cyan-900/20 p-5 rounded-2xl border border-cyan-500/30 text-center relative overflow-hidden mt-6">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50"></div>
                        <p className="text-[10px] font-bold text-cyan-400 uppercase tracking-widest mb-3 flex items-center justify-center gap-2">
                          <i className="ph ph-image text-sm"></i> Audio Rekaman (Max 25MB / 15 Min)
                        </p>
                        <input type="file" accept="audio/*" onChange={handleAudioUpload} className="text-xs block mx-auto cursor-pointer text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-cyan-500/10 file:text-cyan-400 hover:file:bg-cyan-500/20 transition-all" />
                        {audioUrl && <audio controls src={audioUrl} className="w-full h-10 mt-4 rounded-xl opacity-90" />}
                      </div>

                      {/* Eksekusi AI */}
                      <div className="pt-2">
                        <button onClick={handleGenerateAI} disabled={isGenerating || !audioFile} className={`w-full py-4 rounded-2xl font-extrabold tracking-wide uppercase text-sm flex items-center justify-center gap-3 shadow-xl transition-all ${isGenerating ? 'bg-slate-800 border border-slate-700 text-slate-500 cursor-not-allowed' : 'bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white shadow-[0_0_25px_rgba(6,182,212,0.4)] border border-cyan-400/30'}`}>
                          {isGenerating ? <i className="ph ph-spinner ph-spin text-xl"></i> : <i className={`ph-fill ph-sparkle text-xl ${audioFile ? 'animate-pulse text-cyan-200' : ''}`}></i>}
                          {isGenerating ? 'AI Sedang Memproses Data...' : 'Mulai Proses AI'}
                        </button>
                        {statusMessage && (
                          <p className="text-center text-xs font-mono text-cyan-400 mt-4 animate-pulse flex justify-center items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-cyan-400"></span> {statusMessage}
                          </p>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Editor Hasil AI */}
                  <div className="bg-slate-800/40 backdrop-blur-xl rounded-3xl shadow-xl border border-slate-700/50 p-6 space-y-5">
                    <h3 className="font-bold text-white flex items-center gap-2 border-b border-slate-700/50 pb-4">
                      <div className="bg-emerald-500/20 p-1.5 rounded-md text-emerald-400"><i className="ph ph-list-checks text-lg"></i></div> 
                      Terminal Edit AI
                    </h3>
                    <div className="space-y-5">
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Ringkasan Pembahasan</label>
                        <textarea name="pembahasan" value={formData.pembahasan} onChange={handleInputChange} className="w-full p-4 bg-slate-900/60 border border-slate-700 rounded-xl h-36 text-sm text-slate-300 leading-relaxed focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none custom-scrollbar" />
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Instruksi / Arahan Pimpinan</label>
                        <textarea name="arahanPimpinan" value={formData.arahanPimpinan} onChange={handleInputChange} className="w-full p-4 bg-slate-900/60 border border-slate-700 rounded-xl h-32 text-sm text-slate-300 leading-relaxed focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none custom-scrollbar" />
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Kesimpulan Akhir</label>
                        <textarea name="kesimpulan" value={formData.kesimpulan} onChange={handleInputChange} className="w-full p-4 bg-slate-900/60 border border-slate-700 rounded-xl h-32 text-sm text-slate-300 leading-relaxed focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none custom-scrollbar" />
                      </div>
                    </div>
                  </div>
                </div>

                {/* PANEL KANAN: PRATINJAU DOKUMEN */}
                <div className="flex flex-col gap-4">
                  <div className="bg-slate-800/40 backdrop-blur-xl border border-slate-700/50 p-4 rounded-2xl shadow-xl flex flex-col md:flex-row gap-3 justify-between items-center sticky top-4 z-10">
                    <h2 className="font-bold text-white flex items-center gap-2 text-sm tracking-wide">
                      <i className="ph ph-file-text text-cyan-400 text-lg"></i> Live Preview Dokumen
                    </h2>
                    <div className="flex flex-wrap gap-2">
                      <button onClick={handleSaveToCloud} disabled={isSaving} className="bg-emerald-600/80 border border-emerald-500/50 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-emerald-500 transition-colors shadow-lg shadow-emerald-900/50">
                        {isSaving ? <i className="ph ph-spinner ph-spin text-sm"></i> : <i className="ph ph-cloud-arrow-up text-sm"></i>} Simpan ke Cloud
                      </button>
                      <button onClick={downloadWord} className="bg-blue-600/80 border border-blue-500/50 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-blue-500 transition-colors shadow-lg shadow-blue-900/50">
                        <i className="ph ph-pencil-simple text-sm"></i> Ekspor Word
                      </button>
                      <button onClick={downloadPDF} className="bg-rose-600/80 border border-rose-500/50 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-rose-500 transition-colors shadow-lg shadow-rose-900/50">
                        <i className="ph ph-download-simple text-sm"></i> Ekspor PDF
                      </button>
                    </div>
                  </div>

                  <div className="bg-slate-900 p-4 md:p-8 rounded-3xl overflow-auto h-[85vh] border border-slate-700 shadow-inner custom-scrollbar flex justify-center relative">
                    <div 
                      id="document-area"
                      ref={reportRef} 
                      style={{
                        fontFamily: "'Bookman Old Style', 'Bookman', serif",
                        fontSize: '12pt', lineHeight: '1.5', color: 'black', backgroundColor: 'white',
                        minHeight: paperSize === 'legal' ? '355.6mm' : '297mm',
                        width: paperSize === 'legal' ? '215.9mm' : '210mm',
                        margin: '0 auto', padding: '20mm', boxShadow: '0 0 20px rgba(0,0,0,0.5)'
                      }}
                    >
                      {/* KOP INSTANSI */}
                      <div className="flex items-center border-b-[3px] border-double border-black pb-4 mb-6">
                        {instansiLogo ? (
                          <img src={instansiLogo} alt="Logo" className="w-[90px] h-[90px] object-contain mr-6" />
                        ) : (
                          <div className="w-[90px] h-[90px] border-2 border-dashed border-slate-300 flex items-center justify-center mr-6 text-[8pt] text-slate-400 italic text-center leading-tight">Logo<br/>(Opsional)</div>
                        )}
                        <div className="flex-1 text-center">
                          <h1 className="font-bold uppercase text-[14pt] leading-tight mb-1">{formData.instansiNama || 'NAMA INSTANSI ORGANISASI'}</h1>
                          <p className="text-[10pt] leading-snug">{formData.instansiAlamat || 'Alamat Lengkap Instansi / Organisasi'}</p>
                        </div>
                      </div>

                      <div className="text-center mb-8">
                        <h2 className="font-bold uppercase text-[14pt] underline">NOTULEN RAPAT</h2>
                      </div>

                      <div className="mb-8">
                        <table className="w-full border-collapse">
                          <tbody className="align-top">
                            <tr><td className="w-[180px] py-1">Hari / Tanggal</td><td className="w-4 py-1">:</td><td className="py-1">{formData.tanggal || '-'}</td></tr>
                            <tr><td className="py-1">Tempat</td><td className="py-1">:</td><td className="py-1">{formData.tempat || '-'}</td></tr>
                            <tr><td className="py-1">Acara</td><td className="py-1">:</td><td className="py-1">{formData.acara || '-'}</td></tr>
                            <tr><td className="py-1">Pimpinan Rapat</td><td className="py-1">:</td><td className="py-1">{formData.pimpinan || '-'}</td></tr>
                            <tr><td className="py-1">Pencatat</td><td className="py-1">:</td><td className="py-1">{formData.pencatat || '-'}</td></tr>
                            <tr><td className="py-1">Peserta Hadir</td><td className="py-1">:</td><td className="py-1 whitespace-pre-wrap">{formData.peserta ? formData.peserta.replace(/\n/g, ', ') : '-'}</td></tr>
                          </tbody>
                        </table>
                      </div>

                      <div className="mb-6">
                        <h3 className="font-bold underline mb-2 uppercase text-[12pt]">I. Pembahasan:</h3>
                        <div className="text-justify whitespace-pre-wrap pl-2 leading-relaxed">{formData.pembahasan || "• Belum ada data pembahasan."}</div>
                      </div>

                      <div className="mb-6">
                        <h3 className="font-bold underline mb-2 uppercase text-[12pt]">II. Arahan Pimpinan Rapat:</h3>
                        <div className="text-justify whitespace-pre-wrap pl-2 leading-relaxed">{formData.arahanPimpinan || "• Belum ada data arahan pimpinan."}</div>
                      </div>

                      <div className="mb-12">
                        <h3 className="font-bold underline mb-2 uppercase text-[12pt]">III. Kesimpulan:</h3>
                        <div className="text-justify whitespace-pre-wrap pl-2 leading-relaxed">{formData.kesimpulan || "• Belum ada data kesimpulan."}</div>
                      </div>

                      <div className="grid grid-cols-2 mt-20 break-inside-avoid">
                        <div className="text-center">
                          <p className="mb-24">Pimpinan Rapat,</p>
                          <p className="font-bold underline uppercase">{formData.pimpinan || '........................'}</p>
                        </div>
                        <div className="text-center">
                          <p className="mb-24">Notulis,</p>
                          <p className="font-bold underline uppercase">{formData.pencatat || '........................'}</p>
                        </div>
                      </div>

                    </div>
                  </div>
                </div>
              </div>
              )}

              {activeTab === 'history' && (
                <div className="max-w-[1450px] mx-auto relative z-10 bg-slate-800/40 backdrop-blur-xl rounded-3xl shadow-xl border border-slate-700/50 p-6 md:p-10 min-h-[60vh]">
                  <h2 className="text-2xl font-bold text-white mb-8 flex items-center gap-3">
                    <i className="ph ph-clock-counter-clockwise text-cyan-400 text-3xl"></i> Riwayat Database Cloud
                  </h2>
                  
                  {isLoadingHistory ? (
                    <div className="flex justify-center items-center py-20 text-cyan-400">
                      <i className="ph ph-spinner ph-spin text-5xl"></i>
                    </div>
                  ) : historyRecords.length === 0 ? (
                    <div className="text-center py-20">
                      <div className="bg-slate-800/50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-700/50">
                        <i className="ph ph-file-text text-slate-500 text-4xl"></i>
                      </div>
                      <h3 className="text-xl font-bold text-slate-300 mb-2">Belum ada riwayat tersimpan</h3>
                      <p className="text-slate-500">Notulensi yang Anda simpan di perangkat ini akan muncul di sini.</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                      {historyRecords.map(record => (
                        <div key={record.id} className="bg-slate-900/50 p-6 rounded-2xl border border-slate-700 hover:border-cyan-500/50 hover:shadow-[0_0_20px_rgba(6,182,212,0.15)] transition-all group relative overflow-hidden flex flex-col justify-between h-full">
                          <div className="absolute top-0 left-0 w-1 h-full bg-cyan-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                          
                          <div>
                            <h3 className="font-bold text-white text-lg mb-1 line-clamp-2" title={record.acara}>{record.acara || "Agenda Tidak Berjudul"}</h3>
                            <p className="text-xs text-cyan-400 mb-4 font-mono font-medium">{record.tanggalSimpan || "Waktu Simpan Kosong"}</p>
                            
                            <div className="space-y-2 mb-6">
                              <p className="text-sm text-slate-400 truncate flex items-center gap-2">
                                <i className="ph ph-buildings text-slate-500 flex-shrink-0"></i> {record.instansiNama || "-"}
                              </p>
                              <p className="text-sm text-slate-400 truncate flex items-center gap-2">
                                <i className="ph ph-user text-slate-500 flex-shrink-0"></i> {record.pimpinan || "-"}
                              </p>
                            </div>
                          </div>
                          
                          <button onClick={() => {
                            setFormData(record);
                            setAudioFile(null); 
                            setAudioUrl(null);
                            setParticipantInput("");
                            setActiveTab('create');
                          }} className="w-full bg-slate-800 hover:bg-cyan-600 text-white py-2.5 rounded-xl text-sm font-bold transition-colors flex justify-center items-center gap-2">
                            <i className="ph ph-pencil-simple text-base"></i> Buka Notulensi
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
